# =============================================
# EVENTS BLOCK
# =============================================
# Configures how nginx handles connections.
# Required block even if empty — nginx won't start without it.
# Can set things like worker_connections (max simultaneous connections per worker).
events {}

http {
    # =============================================
    # HTTP BLOCK
    # =============================================
    # The main block for all web traffic configuration.
    # Everything related to serving websites goes inside here.
    # You can have multiple "server" blocks inside one "http" block.

    # Tells nginx to load the mime.types file, which maps file extensions
    # to Content-Type headers. Without this, nginx wouldn't know that
    # .css → text/css, .js → application/javascript, .png → image/png, etc.
    # Browsers use Content-Type to decide how to handle each file.
    include mime.types;

    server {
        # =============================================
        # SERVER BLOCK (Virtual Host)
        # =============================================
        # A server block defines one website/virtual host.
        # You can have multiple server blocks to host multiple sites.

        # Listen on port 80 (HTTP, the default web port).
        # When a browser visits http://your-server, it connects on port 80.
        listen 80;

        # The root directory where your website files live.
        # When someone requests /hello.html, nginx looks for
        # /home/ahmed/mysite1/hello.html on disk.
        root /home/ahmed/mysite1;

        # Default files to serve when a directory is requested.
        # If someone visits /, nginx tries /home/ahmed/mysite1/index.html first,
        # then /home/ahmed/mysite1/index.htm if index.html doesn't exist.
        index index.html index.htm;

        # =============================================
        # REDIRECTS (return & rewrite with redirect)
        # =============================================
        # Redirects send the browser to a NEW URL.
        # The user sees the URL change in their address bar.
        # The server responds with a 3xx status code.

        # --- 301 Permanent Redirect ---
        # "This page has PERMANENTLY moved. Update your bookmarks."
        # Browsers & search engines cache this.
        # Visit /old-page  →  browser goes to /new-page
        location = /old-page {
            return 301 /new-page;
        }

        # --- 302 Temporary Redirect ---
        # "This page is TEMPORARILY somewhere else. Keep using the old URL."
        # Visit /promo  →  browser goes to /seasonal-sale
        location = /promo {
            return 302 /seasonal-sale;
        }

        # --- Redirect using rewrite (regex-based) ---
        # Redirects any URL like /blog/123 to /articles/123
        # The "redirect" flag = 302, use "permanent" for 301
        rewrite ^/blog/(\d+)$ /articles/$1 redirect;

        # =============================================
        # REWRITES (internal, invisible to the user)
        # =============================================
        # Rewrites change the URL INTERNALLY on the server.
        # The user's address bar stays the same — they never know.
        # No 3xx response; nginx just serves different content.

        # --- Simple internal rewrite ---
        # User visits /about  →  nginx internally serves /about.html
        # Address bar still shows /about
        rewrite ^/about$ /about.html last;

        # --- Rewrite with capture group ---
        # User visits /user/42  →  nginx internally serves /profile.html?id=42
        # Address bar still shows /user/42
        rewrite ^/user/(\d+)$ /profile.html?id=$1 last;

        # =============================================
        # SUMMARY / CHEAT SHEET
        # =============================================
        # return 301 /new   → Permanent redirect (browser sees new URL)
        # return 302 /new   → Temporary redirect (browser sees new URL)
        # rewrite ... permanent → Same as 301 but with regex support
        # rewrite ... redirect  → Same as 302 but with regex support
        # rewrite ... last      → Internal rewrite (URL bar unchanged)
        # rewrite ... break     → Internal rewrite, stops processing in current location
        #
        # KEY DIFFERENCE:
        #   Redirect = browser makes a NEW request to the new URL (2 round trips)
        #   Rewrite  = nginx silently serves different content (1 round trip)
    }
}
